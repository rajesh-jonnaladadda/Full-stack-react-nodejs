name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
#CD

  deploy:
      runs-on: ubuntu-latest    
      needs: build
      steps:

        - name: Checkout
          uses: actions/checkout@v4

        - name: Azure Login
          uses: azure/login@v2
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
        - name: Terraform Init
          working-directory: terraform
          run: terraform init

        - name: Terraform Plan
          working-directory: terraform
          run: |
            terraform plan \
                -var-file="terrafrom.tfvars" \
                -input=false \
                -out=tfplan

        - name: Terraform Apply
          working-directory: terraform
          run: terraform apply -auto-approve tfplan

        - name: Setup kubectl
          uses: azure/setup-kubectl@v4  

        - name: Get AKS credentials
          run: |
            az aks get-credentials \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ vars.AKS_NAME }} \
            --overwrite-existing  

        - name: Wait cluster ready
          run: |
              az aks wait \
              --resource-group ${{ vars.RG_NAME }} \
              --name ${{ vars.AKS_NAME }} \
              --created
        - name: Deploy to Kubernetes
          run: |
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/postgres-deployment.yaml
            kubectl apply -f k8s/postgres-service.yaml
            kubectl apply -f k8s/backend-deployment.yaml
            kubectl apply -f k8s/backend-service.yaml
            kubectl apply -f k8s/frontend-deployment.yaml
            kubectl apply -f k8s/frontend-service.yaml